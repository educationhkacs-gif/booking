<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中西醫結合預約系統 | Centre for Integrated Medicine Booking System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_green.css">
  
  <style>
    /* 手機版優化 CSS (RWD) */
    @media (max-width: 575.98px) {
      .clinic-logo {
        max-width: 60% !important;
      }
      .card-header h4 {
        font-size: 1.1rem;
      }
      .row > [class*='col-'] {
        margin-bottom: 1.5rem !important;
      }
      .form-label {
        font-size: 0.95rem;
      }
      .form-control, .form-select, .btn {
        font-size: 0.95rem !important;
      }
    }
    /* 修正 Flatpickr 在 Bootstrap 內的樣式微調 */
    .flatpickr-input[readonly] {
      background-color: #fff !important;
    }
    /* 雙語副標題微調 */
    .en-sub {
      font-size: 0.85rem;
      display: block;
      font-weight: normal;
      opacity: 0.9;
    }
  </style>
</head>
<body style="background-color: #f0f7f4;">

<div class="container mt-2">
  <div class="text-center mb-4 mt-3">
    <img src="https://assets-apj.mkt.dynamics.com/9059f229-f610-4007-bb68-1c96dc434088/digitalassets/images/aab27902-7659-f111-a825-000d3a8617e0?ts=639154466854471163" 
         alt="Clinic Logo" 
         class="img-fluid clinic-logo" 
         style="max-width: 250px; height:auto; object-fit:contain;">
  </div>

  <div class="row">
    <div class="col-md-6 text-center mb-4">
      <img src="https://assets-apj.mkt.dynamics.com/9059f229-f610-4007-bb68-1c96dc434088/digitalassets/images/38e4152c-d658-f111-a825-000d3a813552?ts=639153780385615895" 
           alt="Clinic Banner" 
           class="img-fluid rounded shadow-sm">
    </div>

    <div class="col-md-6">
      <div class="card shadow-lg mb-4">
        <div class="card-header bg-success text-white text-center">
          <h4 class="mb-0 py-1">
            中西醫結合預約系統
            <span class="en-sub">Centre for Integrated Medicine Booking System</span>
          </h4>
        </div>
        <div class="card-body">
          <form id="bookingForm" class="row g-3">
            
            <div class="col-md-12">
              <label class="form-label fw-bold">姓名 <span class="text-muted fw-normal">/ Full Name</span></label>
              <input type="text" name="name" class="form-control form-control-lg" placeholder="請輸入姓名 / Please enter your name" required>
            </div>
            
            <div class="col-md-12">
              <label class="form-label fw-bold">電話 <span class="text-muted fw-normal">/ Phone Number</span></label>
              <input type="tel" name="phone" class="form-control form-control-lg" placeholder="請輸入香港電話 / Hong Kong phone number" required>
            </div>
            
            <div class="col-md-12">
              <label class="form-label fw-bold">電郵 <span class="text-muted fw-normal">/ Email Address</span></label>
              <input type="email" name="email" class="form-control form-control-lg" placeholder="請輸入常用電郵 / e.g. user@example.com" required>
            </div>
            
            <div class="col-md-12">
              <label class="form-label fw-bold">選擇日期 <span class="text-muted fw-normal">/ Select Date</span></label>
              <input type="text" id="dateInput" name="date" class="form-control form-control-lg" placeholder="正在載入日曆... / Loading calendar..." required disabled>
            </div>
            
            <div class="col-md-12">
              <label class="form-label fw-bold">選擇時段 <span class="text-muted fw-normal">/ Select Time Slot</span></label>
              <select id="timeSelect" name="time" class="form-select form-select-lg" required disabled>
                <option value="">請先選擇日期 / Please select a date first</option>
              </select>
            </div>
            
            <div class="col-12 mt-4">
              <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100" disabled>
                提交預約 / Submit Booking
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
  <div id="bookingToast" class="toast align-items-center text-white border-0 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
    <div class="d-flex">
      <div id="toastMessage" class="toast-body fs-6 fw-bold"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh-tw.js"></script>

<script>
let serverData = {};
let bookingToast;
let fpInstance; 

window.addEventListener('DOMContentLoaded', () => {
  bookingToast = new bootstrap.Toast(document.getElementById('bookingToast'));

  const fetchUrl = "https://hook.us2.make.com/miemrdkv2ttm1lrpm4aia9d5kenf39pi";
  
  fetch(fetchUrl)
    .then(res => {
      if (!res.ok) throw new Error("伺服器回應錯誤 / Server Error");
      return res.json();
    })
    .then(data => {
      const rawSlots = data.slots || [];
      serverData = {};

      rawSlots.forEach(item => {
        const d = item.date; 
        const t = item.time;
        if (d && t) {
          if (!serverData[d]) { serverData[d] = []; }
          if (!serverData[d].includes(t)) { serverData[d].push(t); }
        }
      });

      const dateInput = document.getElementById("dateInput");
      const enableDates = Object.keys(serverData); 
      
      if (enableDates.length > 0) {
        dateInput.disabled = false;
        dateInput.placeholder = "請點擊選擇日期 / Click to select date";

        // 初始化 Flatpickr 日曆
        fpInstance = flatpickr("#dateInput", {
          locale: "zh_tw",          // 預設為繁中，月份與星期格式清晰
          dateFormat: "Y-m-d",      
          minDate: "today",         
          maxDate: new Date().fp_incr(90), 
          enable: enableDates,      
          onChange: function(selectedDates, dateStr) {
            handleDateChange(dateStr);
          }
        });
      } else {
        dateInput.placeholder = "暫時沒有可預約的日子 / No available dates";
      }
    })
    .catch(err => {
      console.error("載入失敗：", err);
      document.getElementById("dateInput").placeholder = "無法載入日曆，請重新整理 / Failed to load calendar, please refresh";
    });
});

function handleDateChange(selectedDate) {
  const timeSelect = document.getElementById("timeSelect");
  const submitBtn = document.getElementById("submitBtn");
  
  timeSelect.innerHTML = '<option value="">--- 請選擇時段 / Please select a time slot ---</option>';
  
  if (!selectedDate) {
    timeSelect.disabled = true;
    submitBtn.disabled = true;
    return;
  }
  
  const availableTimes = serverData[selectedDate] || [];
  availableTimes.sort();

  if(availableTimes.length > 0) {
    availableTimes.forEach(time => {
      const option = document.createElement("option");
      option.value = time;
      option.textContent = time;
      timeSelect.appendChild(option);
    });
    timeSelect.disabled = false;
    submitBtn.disabled = false;
  } else {
    timeSelect.innerHTML = '<option value="">此日子剛好滿額了！ / Fully Booked!</option>';
    timeSelect.disabled = true;
    submitBtn.disabled = true;
  }
}

function showPopupNotification(message, isSuccess) {
  const toastEl = document.getElementById('bookingToast');
  const msgBody = document.getElementById('toastMessage');
  
  msgBody.textContent = message;
  
  if (isSuccess) {
    toastEl.classList.remove('bg-danger');
    toastEl.classList.add('bg-success');
  } else {
    toastEl.classList.remove('bg-success');
    toastEl.classList.add('bg-danger');
  }
  
  bookingToast.show();
}

// 提交表單
document.getElementById("bookingForm").addEventListener("submit", function(e){
  e.preventDefault();
  const submitBtn = document.getElementById("submitBtn");
  
  submitBtn.disabled = true;
  submitBtn.classList.remove('btn-success');
  submitBtn.classList.add('btn-secondary');
  submitBtn.textContent = "正在處理，請勿關閉... / Processing, please wait...";

  const formData = new FormData(this);
  const searchParams = new URLSearchParams();
  for (const pair of formData) {
    searchParams.append(pair[0], pair[1]);
  }

  fetch("https://hook.us2.make.com/6g8bq147nab5l2cpae7a1xodtx7wgrr1", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: searchParams.toString()
  })
  .then(res => {
    if (res.ok) return res.text();
    throw new Error("連線失敗 / Connection failed");
  })
  .then(text => {
    let data = { success: true };
    try { data = JSON.parse(text); } catch (e) { }

    if(data.success === false) {
      const errMsg = data.message || "預約失敗，時段已被佔用。 / Booking failed, the timeslot has been taken.";
      showPopupNotification(errMsg, false);
      submitBtn.disabled = false;
      submitBtn.classList.remove('btn-secondary');
      submitBtn.classList.add('btn-success');
      submitBtn.textContent = "提交預約 / Submit Booking";
    } else {
      showPopupNotification("預約成功！正在更新名額... / Booking successful! Updating slots...", true);
      setTimeout(() => { location.reload(); }, 3500);
    }
  })
  .catch(err => {
    console.error(err);
    showPopupNotification("預約已提交！頁面即將更新... / Booking submitted! Refreshing page...", true);
    setTimeout(() => { location.reload(); }, 3500);
  });
});
</script>
</body>
</html>
